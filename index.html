<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; font-src https://fonts.bunny.net; script-src 'self'; connect-src ipc: http://ipc.localhost https://ipc.localhost ws://localhost:* http://localhost:*;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audire</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=dm-sans:400,500,600|jetbrains-mono:400,500" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Sidebar -->
      <aside id="sidebar">
        <!-- Top: logo + collapse toggle -->
        <div class="sidebar-top-row">
          <div class="sidebar-logo" aria-hidden="true">
            <span class="sidebar-logo-mark">A</span>
          </div>
          <button class="sidebar-collapse-btn" id="sidebar-collapse-btn" type="button" aria-label="Hide sidebar" title="Hide sidebar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
          </button>
        </div>

        <!-- Search -->
        <div class="sidebar-search">
          <input type="text" class="sidebar-search-input" id="sidebar-search" placeholder="Search   Ctrl+K" />
        </div>

        <!-- Primary nav -->
        <nav class="sidebar-nav" role="navigation">
          <a class="nav-item active" data-view="home" role="button" tabindex="0">
            <span class="nav-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
            </span>
            <span class="nav-label">Home</span>
          </a>
          <a class="nav-item" data-view="shared" role="button" tabindex="0">
            <span class="nav-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </span>
            <span class="nav-label">Shared with me</span>
          </a>
          <a class="nav-item" data-view="chat" role="button" tabindex="0">
            <span class="nav-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </span>
            <span class="nav-label">Chat</span>
          </a>
        </nav>

        <!-- Spaces section -->
        <div class="sidebar-section-label">Spaces</div>
        <div class="sidebar-spaces" id="sidebar-spaces">
          <a class="nav-item" data-view="mynotes" role="button" tabindex="0">
            <span class="nav-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <span class="nav-label">My notes</span>
          </a>
          <!-- Folders injected here by sidebar.js -->
          <div id="sidebar-folder-list"></div>
          <button class="sidebar-add-folder" id="add-folder-btn">
            <span style="opacity:0.5;">+</span>
            <span>Add folder</span>
          </button>
        </div>

        <!-- Bottom area -->
        <div class="sidebar-bottom">
          <button class="user-card" id="user-card-btn" aria-label="Open settings">
            <div class="user-avatar">A</div>
            <div class="user-card-info">
              <span class="user-card-name">Audire User</span>
              <span class="text-xs text-muted">Settings</span>
            </div>
            <span class="user-card-chevron">&rsaquo;</span>
          </button>
        </div>
      </aside>

      <!-- Main content area -->
      <main id="main-panel">
        <!-- Titlebar -->
        <div class="titlebar" data-tauri-drag-region>
          <div class="titlebar-left">
            <button class="titlebar-nav-btn" id="nav-back-btn" title="Go back">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <button class="titlebar-nav-btn" id="nav-forward-btn" title="Go forward">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
            </button>
            <button class="titlebar-nav-btn" id="nav-home-btn" title="Home">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              </svg>
            </button>
          </div>
          <div class="titlebar-center"></div>
          <div class="titlebar-right">
            <button class="btn-quick-note" id="quick-note-btn">+ Quick note</button>
            <div class="window-controls">
              <button class="window-ctrl-btn" id="win-minimize">&mdash;</button>
              <button class="window-ctrl-btn" id="win-maximize">&#9633;</button>
              <button class="window-ctrl-btn close" id="win-close">&times;</button>
            </div>
          </div>
        </div>

        <!-- Views -->
        <div class="view" id="view-home"></div>
        <div class="view" id="view-shared"></div>
        <div class="view" id="view-chat"></div>
        <div class="view" id="view-mynotes"></div>
        <div class="view" id="view-notes"></div>
        <div class="view" id="view-transcript"></div>
        <div class="view" id="view-people"></div>
        <div class="view" id="view-companies"></div>
        <div class="view" id="view-settings"></div>
      </main>

      <!-- Floating sidebar restore button (visible when sidebar is hidden) -->
      <button class="sidebar-restore-btn" id="sidebarRestoreBtn" type="button" aria-label="Show sidebar" title="Show sidebar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>
    </div>

    <!-- Folder modal -->
    <div id="folder-modal" class="modal-overlay" style="display:none;">
      <div class="modal-card">
        <h3 class="modal-title">Create private folder</h3>
        <div class="modal-field">
          <label class="modal-label">Name</label>
          <input type="text" class="modal-input" id="folder-name-input" placeholder="Folder name" />
        </div>
        <div class="modal-field">
          <label class="modal-label">Description (optional)</label>
          <textarea class="modal-textarea" id="folder-desc-input" placeholder="What is this folder for?"></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-ghost btn-sm" id="folder-cancel-btn">Cancel</button>
          <button class="btn-primary btn-sm" id="folder-create-btn">Create</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
