<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src ipc: http://ipc.localhost https://ipc.localhost;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audire</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
          <div class="sidebar-logo">
            <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" type="button" aria-label="Collapse sidebar">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div class="logo-icon">P</div>
          </div>

          <button class="search-trigger" id="searchTrigger">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <span>Search</span>
            <kbd>Ctrl+K</kbd>
          </button>

          <nav class="sidebar-nav">
            <a href="#home" class="nav-item active" data-view="home">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              <span>Home</span>
            </a>
            <a href="#shared" class="nav-item" data-view="shared">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              <span>Shared with me</span>
            </a>
            <a href="#chat" class="nav-item" data-view="chat">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <span>Chat</span>
            </a>
          </nav>

          <div class="sidebar-section">
            <h3 class="section-title">Spaces</h3>
            <a href="#notes" class="nav-item" data-view="notes">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
              <span>My notes</span>
            </a>
            <div id="sidebarFolders"></div>
            <button class="sidebar-faint-action" id="sidebarAddFolderBtn" type="button">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
              <span>Add folder</span>
            </button>
          </div>
        </div>

        <div class="sidebar-bottom">
          <div class="sidebar-icons">
            <button class="icon-btn" title="New note" id="newNoteBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="icon-btn" title="People" data-view="people" onclick="window.location.hash='people'">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
            <button class="icon-btn" title="Companies" data-view="companies" onclick="window.location.hash='companies'">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            </button>
          </div>
          <div class="user-profile" id="userProfile">
            <div class="user-avatar">U</div>
            <span class="user-name">User</span>
          </div>
        </div>
      </aside>

      <!-- Main content area -->
      <main class="content" id="content">
        <!-- Views rendered dynamically by JS -->
      </main>
    </div>

    <!-- Search modal overlay -->
    <div class="modal-overlay hidden" id="searchModal">
      <div class="search-modal">
        <div class="search-input-wrap">
          <input type="text" id="searchInput" placeholder="Search meetings, notes, people..." autocomplete="off" />
          <kbd>ESC</kbd>
        </div>
        <div class="search-results" id="searchResults">
          <div class="search-section">
            <h4>Meetings</h4>
            <p class="empty-hint">Start typing to search...</p>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-overlay hidden" id="folderModalOverlay">
      <div class="folder-modal">
        <div class="folder-modal-header">
          <div class="folder-modal-title-row">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8l-2-2Z"/></svg>
            <h2>Create private folder</h2>
          </div>
          <button class="folder-modal-close" id="folderModalCloseBtn" type="button" aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>

        <div class="folder-modal-body">
          <label class="folder-modal-label" for="folderModalTitle">Title and icon</label>
          <div class="folder-title-input-wrap">
            <span class="folder-title-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8l-2-2Z"/></svg>
            </span>
            <input id="folderModalTitle" type="text" placeholder="Title" autocomplete="off" />
          </div>

          <label class="folder-modal-label" for="folderModalDescription">Description</label>
          <textarea id="folderModalDescription" rows="4" placeholder="Describe the purpose of this folder"></textarea>

          <button class="folder-privacy-row" type="button">
            <div class="folder-privacy-copy">
              <div class="folder-privacy-title">
                <span class="folder-privacy-icon">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 1 1 8 0v3"/></svg>
                </span>
                <span>My notes</span>
              </div>
              <p>Private. Only people added to the folder can view.</p>
            </div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          </button>
        </div>

        <div class="folder-modal-footer">
          <button class="btn btn-ghost" id="folderModalCancelBtn" type="button">Cancel</button>
          <button class="btn btn-primary" id="folderModalCreateBtn" type="button" disabled>Create</button>
        </div>
      </div>
    </div>

    <!-- Floating capture pill -->
    <div class="capture-bar hidden" id="captureBar">
      <div class="capture-bar-inner">
        <div class="capture-pill-meta">
          <div class="capture-pill-head">
            <div class="capture-indicator">
              <span class="pulse-dot"></span>
              <span id="captureStatus">Recording</span>
            </div>
            <span class="capture-runtime-status" id="captureRuntimeStatus">Listening</span>
          </div>
          <div class="capture-wave-row">
            <div class="capture-wave" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="capture-preview" id="capturePreview">Waiting for speech…</div>
          </div>
        </div>
        <div class="capture-actions">
          <span class="capture-timer" id="captureTimer">00:00</span>
          <button class="capture-stop-btn" id="captureStopBtn" type="button" aria-label="Stop recording">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <rect x="6" y="6" width="12" height="12" rx="2"></rect>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
