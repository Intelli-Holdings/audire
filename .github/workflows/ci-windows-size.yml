name: ci-windows-size

on:
  push:
  pull_request:

jobs:
  build-and-check-size:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Tauri release bundle
        run: npx tauri build

      - name: Enforce artifact size <= 123 MB (129,331,200 bytes)
        shell: pwsh
        run: |
          $limit = 129331200
          $paths = @(
            "src-tauri/target/release/bundle/msi",
            "src-tauri/target/release/bundle/nsis"
          )
          $found = @()
          foreach ($p in $paths) {
            if (Test-Path $p) {
              $found += Get-ChildItem -Path $p -Recurse -File | Where-Object { $_.Extension -in ".msi", ".exe" }
            }
          }
          if ($found.Count -eq 0) {
            Write-Host "No installer artifacts found. Listing bundle dir:"
            Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -File -ErrorAction SilentlyContinue | Select-Object FullName, Length
            exit 1
          }
          $tooBig = $found | Where-Object { $_.Length -gt $limit }
          $found | ForEach-Object { Write-Host ("ARTIFACT: {0} ({1:N0} bytes)" -f $_.FullName, $_.Length) }
          if ($tooBig.Count -gt 0) {
            Write-Error "One or more artifacts exceed 123 MB:"
            $tooBig | ForEach-Object { Write-Error ("TOO BIG: {0} ({1:N0} bytes)" -f $_.FullName, $_.Length) }
            exit 1
          }
          Write-Host "All artifacts are within size limit."

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audire-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  test-rust:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust unit tests
        working-directory: src-tauri
        run: cargo test --features asr_deepgram,asr_assemblyai
